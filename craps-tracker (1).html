<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Craps Roll Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0c0f14;
    --surface: #151921;
    --surface2: #1c2230;
    --border: #2a3040;
    --text: #e8ecf4;
    --text-dim: #6b7a94;
    --accent-green: #22c55e;
    --accent-green-dim: rgba(34,197,94,0.12);
    --accent-red: #ef4444;
    --accent-red-dim: rgba(239,68,68,0.1);
    --accent-amber: #f59e0b;
    --accent-amber-dim: rgba(245,158,11,0.1);
    --accent-blue: #3b82f6;
    --glow-green: 0 0 20px rgba(34,197,94,0.25);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  .noise {
    position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }

  .container {
    position: relative; z-index: 1;
    max-width: 720px; margin: 0 auto;
    padding: 24px 16px 40px;
  }

  header { text-align: center; margin-bottom: 32px; }

  header h1 {
    font-family: 'Archivo Black', sans-serif;
    font-size: 28px;
    letter-spacing: 2px;
    text-transform: uppercase;
    background: linear-gradient(135deg, var(--accent-green), var(--accent-blue));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  header p {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 6px;
    letter-spacing: 1px;
  }

  .stats-bar {
    display: flex; justify-content: center; gap: 32px;
    margin-bottom: 28px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--text-dim);
  }
  .stats-bar span strong { color: var(--text); font-weight: 600; }

  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 12px;
    padding-left: 4px;
  }

  .point-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 28px;
  }

  .point-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 12px;
    text-align: center;
    cursor: pointer;
    transition: all 0.15s ease;
    user-select: none;
    position: relative;
    overflow: hidden;
  }
  .point-card::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(circle at 50% 0%, var(--accent-green-dim), transparent 70%);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .point-card:hover { border-color: var(--accent-green); }
  .point-card:hover::before { opacity: 1; }
  .point-card:active { transform: scale(0.96); box-shadow: var(--glow-green); }

  .point-card .number {
    font-family: 'Archivo Black', sans-serif;
    font-size: 36px;
    line-height: 1;
    color: var(--accent-green);
    position: relative;
  }

  .point-card .since-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-top: 10px;
  }

  .point-card .since-count {
    font-family: 'Archivo Black', sans-serif;
    font-size: 22px;
    color: var(--text);
    margin-top: 2px;
    transition: color 0.3s;
  }

  .point-card .since-count.hot { color: var(--accent-amber); }
  .point-card .since-count.cold { color: var(--accent-red); }

  .point-card.flash { animation: cardFlash 0.4s ease; }
  @keyframes cardFlash {
    0% { background: rgba(34,197,94,0.25); }
    100% { background: var(--surface); }
  }

  .other-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
    margin-bottom: 32px;
  }

  .other-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 6px;
    text-align: center;
    cursor: pointer;
    transition: all 0.15s ease;
    user-select: none;
  }
  .other-btn:hover { border-color: var(--accent-amber); background: var(--accent-amber-dim); }
  .other-btn:active { transform: scale(0.94); }

  .other-btn .number {
    font-family: 'Archivo Black', sans-serif;
    font-size: 22px;
    color: var(--accent-amber);
  }
  .other-btn .hit-count {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 4px;
  }

  .controls {
    display: flex; gap: 10px; justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 28px;
  }
  .ctrl-btn {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 1px;
    padding: 10px 20px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s;
  }
  .ctrl-btn:hover { border-color: var(--text-dim); color: var(--text); }
  .ctrl-btn.danger:hover { border-color: var(--accent-red); color: var(--accent-red); }

  /* --- Cold Streaks Panel --- */
  .streak-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 24px;
  }

  .streak-row {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }
  .streak-row:last-child { border-bottom: none; }

  .streak-num {
    font-family: 'Archivo Black', sans-serif;
    font-size: 20px;
    color: var(--accent-red);
    min-width: 32px;
    text-align: right;
    padding-top: 2px;
  }

  .streak-info {
    flex: 1;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
  }

  .streak-max {
    color: var(--accent-amber);
    font-weight: 500;
    margin-bottom: 6px;
  }

  .streak-list {
    line-height: 1.8;
  }

  .streak-empty {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
    text-align: center;
    padding: 12px;
    line-height: 1.7;
  }

  .streak-badge {
    display: inline-block;
    background: var(--accent-red-dim);
    border: 1px solid rgba(239,68,68,0.25);
    border-radius: 4px;
    padding: 2px 8px;
    margin: 2px 4px 2px 0;
    font-size: 12px;
    color: var(--accent-red);
    font-family: 'DM Mono', monospace;
  }
  .streak-badge.is-max {
    background: var(--accent-amber-dim);
    border-color: rgba(245,158,11,0.3);
    color: var(--accent-amber);
    font-weight: 500;
  }

  .streak-no-data {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    opacity: 0.5;
  }

  /* --- Roll Log --- */
  .log-section { margin-top: 8px; }
  .log-section .section-label { margin-bottom: 8px; }

  .log-container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    max-height: 160px;
    overflow-y: auto;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
    line-height: 1.8;
  }
  .log-container::-webkit-scrollbar { width: 4px; }
  .log-container::-webkit-scrollbar-track { background: transparent; }
  .log-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .log-entry { display: inline; }
  .log-entry.point { color: var(--accent-green); font-weight: 500; }
  .log-entry.other { color: var(--accent-amber); }
  .log-sep { color: var(--border); margin: 0 2px; }

  @media (max-width: 480px) {
    .point-grid { grid-template-columns: repeat(2, 1fr); }
    .point-card .number { font-size: 30px; }
    .stats-bar { gap: 20px; font-size: 12px; }
  }
</style>
</head>
<body>

<div class="noise"></div>

<div class="container">
  <header>
    <h1>Craps Tracker</h1>
    <p>Rolls since last hit</p>
  </header>

  <div class="stats-bar">
    <span>Total rolls: <strong id="totalRolls">0</strong></span>
    <span>Last roll: <strong id="lastRoll">—</strong></span>
  </div>

  <div class="section-label">Point Numbers — tap to log a roll</div>
  <div class="point-grid" id="pointGrid"></div>

  <div class="section-label">Other Numbers — tap to log a roll</div>
  <div class="other-grid" id="otherGrid"></div>

  <div class="controls">
    <button class="ctrl-btn" id="undoBtn">↩ Undo</button>
    <button class="ctrl-btn danger" id="resetBtn">Reset All</button>
    <button class="ctrl-btn danger" id="resetStatsBtn">Clear Stats</button>
  </div>

  <div class="section-label">Cold Streaks — 30+ rolls without a hit</div>
  <div class="streak-panel" id="streakPanel"></div>

  <div class="log-section">
    <div class="section-label">Roll History</div>
    <div class="log-container" id="rollLog">No rolls yet.</div>
  </div>
</div>

<script>
const POINTS = [4, 5, 6, 8, 9, 10];
const OTHERS = [2, 3, 7, 11, 12];
const COLD = 30;

let state = {
  totalRolls: 0,
  rollsSince: {},
  otherHits: {},
  history: [],
  coldStreaks: {},
};

POINTS.forEach(n => { state.rollsSince[n] = 0; state.coldStreaks[n] = []; });
OTHERS.forEach(n => state.otherHits[n] = 0);

// Load saved state (uses new key to avoid conflicts with v1)
try {
  const saved = localStorage.getItem('crapsTracker2');
  if (saved) {
    const p = JSON.parse(saved);
    state.totalRolls = p.totalRolls || 0;
    state.history = p.history || [];
    POINTS.forEach(n => {
      state.rollsSince[n] = p.rollsSince?.[n] || 0;
      state.coldStreaks[n] = p.coldStreaks?.[n] || [];
    });
    OTHERS.forEach(n => state.otherHits[n] = p.otherHits?.[n] || 0);
  }
} catch(e) {}

function save() {
  try { localStorage.setItem('crapsTracker2', JSON.stringify(state)); } catch(e) {}
}

function rollNumber(num) {
  state.totalRolls++;
  state.history.push(num);

  if (POINTS.includes(num)) {
    // Record cold streak BEFORE resetting
    const drought = state.rollsSince[num];
    if (drought >= COLD) {
      state.coldStreaks[num].push(drought);
    }
    POINTS.forEach(p => {
      state.rollsSince[p] = (p === num) ? 0 : state.rollsSince[p] + 1;
    });
  } else {
    POINTS.forEach(p => state.rollsSince[p]++);
    state.otherHits[num] = (state.otherHits[num] || 0) + 1;
  }

  save();
  render();

  if (POINTS.includes(num)) {
    const card = document.querySelector(`[data-point="${num}"]`);
    if (card) {
      card.classList.remove('flash');
      void card.offsetWidth;
      card.classList.add('flash');
    }
  }
}

function undo() {
  if (state.history.length === 0) return;
  const hist = [...state.history];
  hist.pop();

  state.totalRolls = 0;
  POINTS.forEach(n => { state.rollsSince[n] = 0; state.coldStreaks[n] = []; });
  OTHERS.forEach(n => state.otherHits[n] = 0);
  state.history = [];

  hist.forEach(n => {
    state.totalRolls++;
    state.history.push(n);
    if (POINTS.includes(n)) {
      const drought = state.rollsSince[n];
      if (drought >= COLD) state.coldStreaks[n].push(drought);
      POINTS.forEach(p => {
        state.rollsSince[p] = (p === n) ? 0 : state.rollsSince[p] + 1;
      });
    } else {
      POINTS.forEach(p => state.rollsSince[p]++);
      state.otherHits[n] = (state.otherHits[n] || 0) + 1;
    }
  });

  save();
  render();
}

function resetAll() {
  if (!confirm('Reset everything including cold streak stats?')) return;
  state.totalRolls = 0;
  POINTS.forEach(n => { state.rollsSince[n] = 0; state.coldStreaks[n] = []; });
  OTHERS.forEach(n => state.otherHits[n] = 0);
  state.history = [];
  save();
  render();
}

function resetStatsOnly() {
  if (!confirm('Clear cold streak stats only? (Keeps rolls & counters)')) return;
  POINTS.forEach(n => state.coldStreaks[n] = []);
  save();
  render();
}

function getSinceClass(count) {
  if (count >= 30) return 'cold';
  if (count >= 18) return 'hot';
  return '';
}

function buildPointGrid() {
  const grid = document.getElementById('pointGrid');
  grid.innerHTML = '';
  POINTS.forEach(num => {
    const count = state.rollsSince[num];
    const cls = getSinceClass(count);
    const card = document.createElement('div');
    card.className = 'point-card';
    card.dataset.point = num;
    card.innerHTML = `
      <div class="number">${num}</div>
      <div class="since-label">Rolls since</div>
      <div class="since-count ${cls}">${count}</div>
    `;
    card.addEventListener('click', () => rollNumber(num));
    grid.appendChild(card);
  });
}

function buildOtherGrid() {
  const grid = document.getElementById('otherGrid');
  grid.innerHTML = '';
  OTHERS.forEach(num => {
    const btn = document.createElement('div');
    btn.className = 'other-btn';
    btn.innerHTML = `
      <div class="number">${num}</div>
      <div class="hit-count">×${state.otherHits[num] || 0}</div>
    `;
    btn.addEventListener('click', () => rollNumber(num));
    grid.appendChild(btn);
  });
}

function buildStreakPanel() {
  const panel = document.getElementById('streakPanel');
  const hasAny = POINTS.some(n => state.coldStreaks[n].length > 0);
  // Also check if any current counter is 30+
  const anyCurrentCold = POINTS.some(n => state.rollsSince[n] >= COLD);

  if (!hasAny && !anyCurrentCold) {
    panel.innerHTML = '<div class="streak-empty">No 30+ droughts recorded yet.<br>When a point hits after 30+ rolls, the streak is logged here.</div>';
    return;
  }

  let html = '';
  POINTS.forEach(num => {
    const streaks = state.coldStreaks[num];
    const current = state.rollsSince[num];
    const allValues = [...streaks];
    // Show current drought as "live" if 30+
    const isLive = current >= COLD;

    if (streaks.length === 0 && !isLive) {
      // Show row but dimmed
      html += `<div class="streak-row">
        <div class="streak-num" style="opacity:0.3">${num}</div>
        <div class="streak-info"><span class="streak-no-data">no 30+ droughts yet</span></div>
      </div>`;
      return;
    }

    const maxCompleted = streaks.length > 0 ? Math.max(...streaks) : 0;
    const maxOverall = Math.max(maxCompleted, isLive ? current : 0);
    const sorted = [...streaks].sort((a, b) => b - a);

    html += `<div class="streak-row">
      <div class="streak-num">${num}</div>
      <div class="streak-info">
        <div class="streak-max">MAX: ${maxOverall} rolls · ${streaks.length} completed${isLive ? ' · LIVE: ' + current : ''}</div>
        <div class="streak-list">`;

    if (isLive) {
      html += `<span class="streak-badge" style="background:rgba(239,68,68,0.2);border-color:rgba(239,68,68,0.5);animation:pulse 1.5s infinite">${current}🔴</span>`;
    }

    sorted.forEach(s => {
      html += `<span class="streak-badge${s === maxCompleted && s === maxOverall ? ' is-max' : ''}">${s}</span>`;
    });

    html += `</div></div></div>`;
  });

  panel.innerHTML = html;
}

function buildLog() {
  const log = document.getElementById('rollLog');
  if (state.history.length === 0) {
    log.innerHTML = 'No rolls yet.';
    return;
  }
  const recent = state.history.slice(-80);
  log.innerHTML = recent.map((n, i) => {
    const cls = POINTS.includes(n) ? 'point' : 'other';
    const sep = i < recent.length - 1 ? '<span class="log-sep">·</span>' : '';
    return `<span class="log-entry ${cls}">${n}</span>${sep}`;
  }).join('');
  log.scrollTop = log.scrollHeight;
}

function render() {
  document.getElementById('totalRolls').textContent = state.totalRolls;
  document.getElementById('lastRoll').textContent = state.history.length ? state.history[state.history.length - 1] : '—';
  buildPointGrid();
  buildOtherGrid();
  buildStreakPanel();
  buildLog();
}

document.getElementById('undoBtn').addEventListener('click', undo);
document.getElementById('resetBtn').addEventListener('click', resetAll);
document.getElementById('resetStatsBtn').addEventListener('click', resetStatsOnly);

// Add pulse animation for live streaks
const style = document.createElement('style');
style.textContent = `@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.6; } }`;
document.head.appendChild(style);

render();
</script>
</body>
</html>
